name: Deploy frontend

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "frontend/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout production
        uses: actions/checkout@v4
        with:
          ref: main
          path: prod-src

      - name: Checkout development
        uses: actions/checkout@v4
        with:
          ref: dev
          path: dev-src

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build Pages artifact
        run: |
          mkdir -p pages-dist/dev
          cp -R prod-src/frontend/. pages-dist/
          cp -R dev-src/frontend/. pages-dist/dev/
          cp prod-src/frontend/config.prod.js pages-dist/config.js
          cp dev-src/frontend/config.dev.js pages-dist/dev/config.js
          touch pages-dist/.nojekyll

      - name: Upload frontend
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
