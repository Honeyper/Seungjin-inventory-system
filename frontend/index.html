<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>(주)승진 관리 시스템 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="login-page" aria-labelledby="page-title">
      <section class="brand-panel" aria-label="시스템 소개">
        <div class="brand-content">
          <div class="brand-mark" aria-hidden="true">
            <img src="./assets/logo-generated.png" alt="" />
          </div>

          <div class="brand-heading">
            <p class="company">(주)승진</p>
            <h1 id="page-title"><span>관리</span> <strong>시스템</strong></h1>
            <div class="title-rule" aria-hidden="true"></div>
          </div>

          <p class="tagline">
            <span>입고부터 출고까지</span>
            <strong>한눈에 관리하는</strong>
            통합 업무 시스템
          </p>

          <div class="module-list" aria-label="주요 관리 메뉴">
            <div class="module-item">
              <span class="module-icon">
                <img src="./assets/icon-inbound.png" alt="" />
              </span>
              <span>입고 관리</span>
            </div>
            <div class="module-item">
              <span class="module-icon">
                <img src="./assets/icon-work.png" alt="" />
              </span>
              <span>작업 관리</span>
            </div>
            <div class="module-item">
              <span class="module-icon">
                <img src="./assets/icon-inventory.png" alt="" />
              </span>
              <span>재고 관리</span>
            </div>
            <div class="module-item">
              <span class="module-icon">
                <img src="./assets/icon-outbound.png" alt="" />
              </span>
              <span>출고 관리</span>
            </div>
          </div>

          <div class="capability-list" aria-label="업무 범위">
            <span><img src="./assets/check-generated.png" alt="" />실크인쇄</span>
            <span><img src="./assets/check-generated.png" alt="" />박인쇄</span>
            <span><img src="./assets/check-generated.png" alt="" />특수인쇄</span>
            <span><img src="./assets/check-generated.png" alt="" />통합 관리</span>
          </div>
        </div>
      </section>

      <section class="login-panel" aria-label="관리자 로그인">
        <div class="login-stack">
          <form class="login-card" id="loginForm">
            <div class="lock-badge" aria-hidden="true">
              <img src="./assets/login-icon-lock-badge.png" alt="" />
            </div>

            <h2>관리자 로그인</h2>
            <div class="login-rule" aria-hidden="true"></div>
            <p class="login-help">계정 정보를 입력하여 로그인해주세요.</p>

            <label class="field">
              <span>
                <img src="./assets/login-icon-user.png" alt="" />
                계정
              </span>
              <input id="accountId" name="accountId" type="text" autocomplete="username" placeholder="계정ID를 입력하세요" />
            </label>

            <label class="field">
              <span>
                <img src="./assets/login-icon-password.png" alt="" />
                비밀번호
              </span>
              <span class="password-control">
                <input
                  id="password"
                  name="password"
                  type="password"
                  autocomplete="current-password"
                  placeholder="비밀번호를 입력하세요"
                />
                <button class="show-password" type="button" aria-label="비밀번호 보기">
                  <img src="./assets/login-icon-eye.png" alt="" />
                </button>
              </span>
            </label>

            <button class="login-button" type="submit">
              <span>로그인</span>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 12h14m-6-6 6 6-6 6" />
              </svg>
            </button>
          </form>
          <p class="copyright">© SEUNGJIN Co., Ltd. All rights reserved.</p>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
